<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Ajiks Billiard - Sage Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root{
  /* Konsep Sage & Wood - Soft & Calm */
  --bg:#1C1E1C; --surface:#252825; --surface2:#2d312d; --surface3:#353a35;
  --border:#3d423d; --borderl:#4a504a;
  --gold:#9EAC8F; --gold2:#B5C0AB; --gold3:#CDD4C7; --golddim:#6B7561;
  --red:#CC8B79; --red2:#DEAC9E; --reddim:#8A5E52;
  --text:#E3E5E0; --muted:#8E918E; --dim:#4a504a;
  --accent:var(--gold); --danger:var(--red2); --warn:#D4A373;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}

/* Luxury background texture - Updated to Sage & Terracotta shades */
body::before{content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(158,172,143,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(204,139,121,0.05) 0%, transparent 50%),
    linear-gradient(rgba(158,172,143,0.015)1px,transparent 1px),
    linear-gradient(90deg,rgba(158,172,143,0.015)1px,transparent 1px);
  background-size:100% 100%,100% 100%,50px 50px,50px 50px;
  pointer-events:none;z-index:0;}

/* ── LOGIN ── */
#loginOverlay{position:fixed;inset:0;background:rgba(28,30,28,0.98);backdrop-filter:blur(20px);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lbox{background:var(--surface);border:1px solid var(--borderl);border-top:2px solid var(--gold);border-radius:2px;padding:44px 48px;width:100%;max-width:420px;box-shadow:0 0 80px rgba(158,172,143,0.06),0 24px 60px rgba(0,0,0,0.8);animation:popIn .5s ease;position:relative;}
.lbox::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
@keyframes popIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.llogo{font-family:'Cinzel',serif;font-size:28px;font-weight:700;letter-spacing:4px;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lsub{text-align:center;color:var(--muted);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;}
.rtabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:24px;}
.rtab{padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;text-align:center;text-transform:uppercase;transition:all .3s;}
.rtab:hover{border-color:var(--golddim);color:var(--gold);}
.rtab.active{background:rgba(158,172,143,0.08);border-color:var(--gold);color:var(--gold);}
.lfg{margin-bottom:16px;}
.lfg label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.lfg input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;}
.lfg input:focus{border-color:var(--gold);}
.lerr{background:rgba(204,139,121,0.1);border:1px solid rgba(204,139,121,0.3);border-radius:2px;padding:10px 14px;color:var(--red2);font-size:13px;margin-bottom:14px;display:none;}
.lbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1c1e1c;border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-top:4px;}
.lbtn:hover{background:linear-gradient(135deg,var(--gold2),var(--gold3));transform:translateY(-1px);box-shadow:0 8px 24px rgba(158,172,143,0.3);}
.lhint{text-align:center;color:var(--muted);font-size:11px;margin-top:16px;line-height:1.8;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:10px;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(28,30,28,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--borderl);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--red),var(--gold),transparent);}
.logo{font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red2);margin:0 6px;vertical-align:middle;box-shadow:0 0 8px var(--red2);}
.hright{display:flex;align-items:center;gap:12px;}
.fbind{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;}
.fbdot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s;}
.fbdot.live{background:#9EAC8F;box-shadow:0 0 8px #9EAC8F;}
.fbdot.off{background:var(--warn);}
.live-badge{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:1px;}
.live-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pu 1.5s ease-in-out infinite;}
@keyframes pu{0%,100%{opacity:1;}50%{opacity:.3;}}
.hclock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.rbadge{padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.rbadge.owner{background:rgba(158,172,143,0.1);border:1px solid rgba(158,172,143,0.3);color:var(--gold);}
.rbadge.kasir{background:rgba(204,139,121,0.1);border:1px solid rgba(204,139,121,0.3);color:var(--red2);}
.btnout{padding:5px 14px;background:rgba(204,139,121,0.08);border:1px solid rgba(204,139,121,0.25);border-radius:2px;color:var(--red2);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.btnout:hover{background:rgba(204,139,121,0.18);}

/* ── TABS ── */
.nav-tabs{display:flex;gap:3px;padding:16px 24px 0;position:relative;z-index:1;flex-wrap:wrap;}
.tab{padding:8px 22px;background:transparent;border:1px solid var(--border);border-bottom:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;cursor:pointer;border-radius:2px 2px 0 0;text-transform:uppercase;transition:all .2s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--surface);color:var(--gold);border-color:var(--gold);border-bottom:1px solid var(--surface);}
.tab.oo{display:none;}

/* ── MAIN ── */
.main{position:relative;z-index:1;padding:0 24px 28px;background:var(--surface);margin:0 24px;border:1px solid var(--borderl);border-top:1px solid var(--gold);border-radius:0 2px 2px 2px;}
.page{display:none;padding-top:22px;}
.page.active{display:block;}

/* ── STATS ROW ── */
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.sc{background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:14px 18px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--gold));}
.sl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.sv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--text);}
.sv.g{color:var(--gold);}.sv.b{color:var(--gold2);}.sv.w{color:var(--red2);}

/* ── SHIFT BANNER ── */
.shift-banner{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;border-radius:2px;margin-bottom:16px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}
.shift-banner.siang{background:rgba(158,172,143,0.06);border:1px solid rgba(158,172,143,0.2);color:var(--gold);}
.shift-banner.malam{background:rgba(204,139,121,0.06);border:1px solid rgba(204,139,121,0.2);color:var(--red2);}

/* ── TABLE CARDS ── */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.tc{background:var(--surface2);border:1px solid var(--border);border-radius:2px;overflow:hidden;transition:all .3s;position:relative;}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);transition:background .3s;}
.tc.running::before{background:linear-gradient(90deg,var(--gold),var(--red),var(--gold));}
.tc.running{border-color:var(--borderl);box-shadow:0 0 30px rgba(158,172,143,0.05);}
.tc.warning::before{background:var(--red2);}
.tc.warning{border-color:var(--red);box-shadow:0 0 30px rgba(204,139,121,0.15);animation:wp 2s ease-in-out infinite;}
.tc.moving-from{border-color:var(--gold)!important;box-shadow:0 0 30px rgba(158,172,143,0.2)!important;}
@keyframes wp{0%,100%{box-shadow:0 0 20px rgba(204,139,121,0.1);}50%{box-shadow:0 0 40px rgba(204,139,121,0.25);}}
.th{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tn{font-family:'Cinzel',serif;font-size:15px;font-weight:600;letter-spacing:2px;color:var(--gold);}
.ts{font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:20px;font-weight:700;text-transform:uppercase;}
.si2{background:rgba(74,80,74,0.4);color:var(--muted);border:1px solid var(--border);}
.sr2{background:rgba(158,172,143,0.1);color:var(--gold);border:1px solid rgba(158,172,143,0.3);}
.sw2{background:rgba(204,139,121,0.1);color:var(--red2);border:1px solid rgba(204,139,121,0.3);}
.tb2{padding:14px;}

/* Customer name */
.cname-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:2px;padding:8px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;text-align:center;letter-spacing:1px;margin-bottom:10px;}
.cname-input:focus{border-color:var(--gold);}
.cname-input::placeholder{color:var(--muted);font-weight:400;}
.cname-display{text-align:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold2);letter-spacing:2px;padding:4px 0 8px;}

/* Preset duration selector */
.preset-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;text-align:center;}
.preset-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px;}
.preset-btn{padding:7px 0;background:var(--surface3);border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.preset-btn:hover{border-color:var(--golddim);color:var(--gold);}
.preset-btn.sel{background:rgba(158,172,143,0.1);border-color:var(--gold);color:var(--gold);}
.preset-price{font-size:9px;color:var(--muted);display:block;margin-top:2px;font-family:'Rajdhani',sans-serif;}
.preset-btn.sel .preset-price{color:var(--golddim);}

/* Timer display */
.timer-wrap{position:relative;text-align:center;margin:6px 0;}
.td{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;text-align:center;letter-spacing:4px;color:var(--text);transition:color .3s;}
.tc.running .td{color:var(--gold);}
.tc.warning .td{color:var(--red2);}
.timer-limit{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:2px;}
.timer-progress{width:100%;height:3px;background:var(--border);border-radius:0;margin:6px 0;overflow:hidden;}
.timer-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--red2));border-radius:0;transition:width .5s linear;}

/* Accumulated rates */
.rate-acc{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:6px 0;}
.rai{background:var(--surface3);border:1px solid var(--border);border-radius:2px;padding:5px 6px;text-align:center;}
.ral{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.rav{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;margin-top:2px;}
.rav.sc2{color:var(--gold2);}.rav.ml{color:var(--red2);}
.pd{text-align:center;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);margin:8px 0;}
.pd .ptotal{font-size:24px;color:var(--gold);font-weight:700;}

/* Rate selector */
.rs{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;}
.ro{padding:7px 5px;background:var(--surface3);border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;line-height:1.4;}
.ro:hover{border-color:var(--golddim);color:var(--gold);}
.ro.sel{background:rgba(158,172,143,0.08);border-color:var(--gold);color:var(--gold);}
.ro.selm{background:rgba(204,139,121,0.08);border-color:var(--red);color:var(--red2);}
.ro .ab{font-size:8px;color:var(--gold);display:block;margin-top:2px;}
.cr{display:flex;gap:5px;margin-bottom:10px;align-items:center;}
.cr input,.cr select{background:var(--surface3);border:1px solid var(--border);border-radius:2px;padding:6px 8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;flex:1;}

/* Buttons */
.ca{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.btn{padding:10px 0;border:none;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.bstart{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1c1e1c;grid-column:span 2;}
.bstart:hover{background:linear-gradient(135deg,var(--gold2),var(--gold3));transform:translateY(-1px);box-shadow:0 6px 20px rgba(158,172,143,0.3);}
.bstop{background:rgba(204,139,121,0.12);color:var(--red2);border:1px solid rgba(204,139,121,0.3);}
.bstop:hover{background:rgba(204,139,121,0.22);}
.bpause{background:rgba(212,163,115,0.1);color:var(--warn);border:1px solid rgba(212,163,115,0.3);}
.bpause:hover{background:rgba(212,163,115,0.2);}
.sinfo{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
.btn-move{width:100%;padding:7px 0;border:1px dashed var(--golddim);border-radius:2px;background:transparent;color:var(--golddim);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s;margin-top:7px;}
.btn-move:hover{border-color:var(--gold);color:var(--gold);background:rgba(158,172,143,0.05);}

/* ── LAPORAN ── */
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.rt{font-family:'Cinzel',serif;font-size:18px;letter-spacing:3px;color:var(--gold);}
.df{display:flex;gap:7px;align-items:center;}
.df input{background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:7px 10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;}
.df input:focus{border-color:var(--gold);}
.bexp{padding:7px 16px;background:rgba(158,172,143,0.08);border:1px solid rgba(158,172,143,0.25);border-radius:2px;color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.bexp:hover{background:rgba(158,172,143,0.15);}
.bdel{padding:7px 16px;background:rgba(204,139,121,0.08);border:1px solid rgba(204,139,121,0.25);border-radius:2px;color:var(--red2);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.bdel:hover{background:rgba(204,139,121,0.18);}
.sc3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.rtw{background:var(--surface2);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;text-align:left;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);background:var(--surface3);border-bottom:1px solid var(--borderl);}
td{padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(158,172,143,0.02);}
td.inc{color:var(--gold);}td.mj{color:var(--gold2);}
td.cust{color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;}
.del-row-btn{padding:3px 10px;background:rgba(204,139,121,0.08);border:1px solid rgba(204,139,121,0.2);border-radius:2px;color:var(--red2);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.del-row-btn:hover{background:rgba(204,139,121,0.2);}

/* ── SETTINGS ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ss{background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:18px;position:relative;}
.ss::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--golddim),transparent);}
.stitle{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.fg{margin-bottom:12px;}
.fl{display:block;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:2px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--gold);}
.bsave{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1c1e1c;border:none;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all .2s;}
.bsave:hover{background:linear-gradient(135deg,var(--gold2),var(--gold3));}
.ptitle{font-family:'Cinzel',serif;font-size:17px;letter-spacing:3px;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.untag{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.fb-st{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:2px;margin-bottom:14px;font-size:13px;font-weight:600;}
.fb-st.ok{background:rgba(158,172,143,0.06);border:1px solid rgba(158,172,143,0.2);color:#9EAC8F;}
.fb-st.no{background:rgba(212,163,115,0.06);border:1px solid rgba(212,163,115,0.2);color:var(--warn);}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(28,30,28,0.88);backdrop-filter:blur(12px);z-index:5000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--borderl);border-top:2px solid var(--gold);border-radius:2px;padding:28px 32px;width:100%;max-width:500px;box-shadow:0 0 60px rgba(158,172,143,0.08),0 24px 60px rgba(0,0,0,0.8);transform:translateY(20px);transition:transform .3s;position:relative;}
.modal-overlay.show .modal{transform:translateY(0);}
.modal::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
